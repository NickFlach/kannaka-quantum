name: bench

# Recall-correspondence benchmark (Quantum-Wave T2.2). Runs the committed
# scenario corpus through `quantum_recall` and gates on the agreement rate
# (quantum top pick == classical argmax) dropping more than 2 points below the
# committed baseline. On PRs it is a required-passing check; weekly it also
# snapshots the result into bench/results/sim/.
#
# Backend: the qBraid free simulator (qbraid:qbraid:sim:qir-sv) when a
# QBRAID_API_KEY secret is configured; otherwise the local state-vector backend
# (an ideal, $0, network-free simulation of the identical circuits). Either way
# the run spends no credits — the free sim is $0 and local needs no account.
on:
  schedule:
    - cron: "17 6 * * 1" # 06:17 UTC every Monday
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write # weekly snapshot commit; PRs never reach the commit step

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (editable + dev extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run benchmark (regression gate)
        id: bench
        env:
          QBRAID_API_KEY: ${{ secrets.QBRAID_API_KEY }}
        run: |
          if [ -n "$QBRAID_API_KEY" ]; then
            DEVICE="qbraid:qbraid:sim:qir-sv"
          else
            DEVICE="local:statevector"
            echo "::notice::QBRAID_API_KEY not set — using the local state-vector backend (ideal sim, \$0)."
          fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          # Non-zero exit on a >2-point agreement drop fails the job → gates the PR.
          python -m kannaka_quantum bench \
            --scenarios bench/corpus.json \
            --device "$DEVICE" \
            --shots 2048 \
            --baseline bench/baseline.json \
            --out bench-result.json

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench-result.json
          if-no-files-found: ignore

      - name: Snapshot sim results (weekly / manual)
        if: ${{ success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p bench/results/sim
          cp bench-result.json "bench/results/sim/$DATE.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "bench/results/sim/$DATE.json"
          if git diff --cached --quiet; then
            echo "no change in $DATE snapshot"
            exit 0
          fi
          git commit -m "bench: sim agreement snapshot $DATE [skip ci]"
          git push
