name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# This repo can spend real QPU credits and drive remote agents over SSH. CI is
# the safety floor: lint + the network-free test suite. Tests must NEVER touch a
# real provider — there is no QBRAID_API_KEY / OPENQUANTUM secret in this
# workflow, and the spend-guard tests assert that credit-spending paths refuse
# to run without an explicit opt-in.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Belt-and-suspenders: make sure no spend opt-in leaks into the test env.
      KANNAKA_QUANTUM_ALLOW_SPEND: ""
      KANNAKA_LAB_ALLOW_SPEND: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (editable + dev extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
